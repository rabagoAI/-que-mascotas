/* ── Scroll-triggered fade-in hook ── */
function useScrollFade() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); io.disconnect(); } },
      { threshold: 0.1 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function HeroSection() {
  const videoBgRef = useRef(null);
  const videoRef   = useRef(null);
  const [mounted, setMounted] = useState(false);

  useEffect(() => {
    const t = requestAnimationFrame(() => setMounted(true));
    return () => cancelAnimationFrame(t);
  }, []);

  useEffect(() => {
    const el = videoBgRef.current;
    if (!el || typeof gsap === 'undefined') return;
    let tx = 0, ty = 0, cx = 0, cy = 0, raf = 0;
    const onMove = e => {
      tx = ((e.clientX - window.innerWidth  / 2) / (window.innerWidth  / 2)) * 18;
      ty = ((e.clientY - window.innerHeight / 2) / (window.innerHeight / 2)) * 18;
    };
    const tick = () => {
      cx += (tx - cx) * 0.06;
      cy += (ty - cy) * 0.06;
      gsap.set(el, { x: cx, y: cy });
      raf = requestAnimationFrame(tick);
    };
    window.addEventListener('mousemove', onMove);
    raf = requestAnimationFrame(tick);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);

  return (
    <section id="inicio" className="hero-section">
      <div ref={videoBgRef} className="absolute inset-0 origin-center" style={{ transform: 'scale(1.08)', willChange: 'transform' }}>

            <span className="block line-2">Natural, cercana y pensada para ellos.</span>
          </h1>
          <p style={{ maxWidth: 520, fontSize: 14, lineHeight: 1.7, margin: 0 }}>
            <span>En + que mascotas Ceuta encontrarás lo mejor para tu compañero —</span>
            <span style={{ color: 'rgba(255,255,255,0.5)' }}>{' '}seleccionado con criterio, entregado con cariño.</span>
          </p>
        </div>
